services:
  db:
    image: postgres:16-alpine
    container_name: vyaparsetu-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyaparsetu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vyaparsetu}
      POSTGRES_DB: ${POSTGRES_DB:-vyaparsetu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyaparsetu} -d ${POSTGRES_DB:-vyaparsetu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: vyaparsetu-backend
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
